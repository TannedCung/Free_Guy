services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./frontend_server
      dockerfile: Dockerfile.py
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      - MAZE_ASSETS_LOC=/app/static_dirs/assets
      - LLM_PROVIDER=${LLM_PROVIDER:-vllm}
      - LLM_MODEL=${LLM_MODEL:-llm}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://vllm:8000/v1}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-ada-002}
    volumes:
      - ./backend_server:/backend_server:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"   # exposed for direct access during dev; use port 80 (nginx) normally
    volumes:
      # The symlink frontend/public/assets → ../../frontend_server/static_dirs/assets
      # is broken inside the Docker build context. Mount the real directory here so
      # Vite can serve game assets (tilemap JSON, tilesets, sprites) as static files.
      - ./frontend_server/static_dirs/assets:/app/public/assets:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama
    ports:
      - 11434:11434
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  vllm:
    image: rocm/vllm:latest
    ports:
      - "8090:8000"
    volumes:
      # Bind-mount the host HuggingFace cache so pre-downloaded weights are reused
      - ${HF_CACHE_DIR:-/home/tannedcung/vllm/huggingface}:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGINGFACE_TOKEN:-}
      # Required for gfx1100 (RDNA3 / Radeon PRO W7900) on ROCm
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
    entrypoint: ["python", "-m", "vllm.entrypoints.openai.api_server"]
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen3-8B-FP8}
      --dtype ${VLLM_DTYPE:-auto}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL:-0.65}
      --served-model-name llm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  db:
    image: postgres:12
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  qdrant-data:
  ollama-data:
