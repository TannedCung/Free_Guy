# nginx reverse proxy for Free Guy (docker-compose)
#
# Routing:
#   /api/*, /accounts/*, /admin/*, /health/*, /ws/*,
#   /process_environment/*, /update_environment/*, /path_tester_update/*
#       → Django backend (port 8000)
#
#   everything else  → Vite dev server / React SPA (port 3000)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Use Docker's internal DNS resolver so hostnames are re-resolved after
    # container restarts (avoids stale-IP 502s when upstream containers cycle).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Django backend ────────────────────────────────────────────────────────
    location ~ ^/(api|accounts|admin|health|ws|process_environment|update_environment|path_tester_update)(/|$) {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;

        # WebSocket support (Django Channels)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass real client info so Django builds correct absolute URLs
        # and OAuth redirect_uris use the browser-facing origin.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # ── React SPA / Vite dev server ───────────────────────────────────────────
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;

        # Vite HMR uses WebSocket on the same port — must support upgrade here too
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;

        proxy_read_timeout 120s;
    }
}
