# nginx reverse proxy for Free Guy (docker-compose)
#
# Routing:
#   /api/*, /accounts/*, /admin/*, /health/*, /ws/*,
#   /process_environment/*, /update_environment/*, /path_tester_update/*
#       → Django backend (port 8000)
#
#   everything else  → Vite dev server / React SPA (port 3000)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ── Django backend ────────────────────────────────────────────────────────
    location ~ ^/(api|accounts|admin|health|ws|process_environment|update_environment|path_tester_update)(/|$) {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket support (Django Channels)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass real client info so Django builds correct absolute URLs
        # and OAuth redirect_uris use the browser-facing origin.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # ── React SPA / Vite dev server ───────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Vite HMR uses WebSocket on the same port — must support upgrade here too
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;

        proxy_read_timeout 120s;
    }
}
