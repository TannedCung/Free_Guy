version = "0.1.0"
description = "Generative Agents simulation frontend server"
requires-python = ">=3.10"
dependencies = [
    "aiohttp==3.13.3",
    "aiosignal==1.3.2",
    "async-generator==1.10",
    "async-timeout==4.0.3",
    "attrs==25.3.0",
    "boto==2.49.0",
    "botocore==1.38.0",
    "certifi==2026.2.25",
    "charset-normalizer==3.4.1",
    "click==8.1.8",
    "cycler==0.12.1",
    "dj-database-url==3.1.2",
    "Django==4.2.20",
    "django-cors-headers==4.6.0",
    "django-storages==1.14.4",
    "exceptiongroup==1.2.2",
    "frozenlist==1.5.0",
    "gensim==4.4.0",
    "gunicorn==25.1.0",
    "h11==0.14.0",
    "idna==3.10",
    "importlib-metadata==8.6.1",
    "jmespath==1.0.1",
    "joblib>=1.4.2",
    "kiwisolver==1.4.8",
    "matplotlib==3.10.8",
    "multidict==6.4.3",
    "nltk==3.9.3",
    "numpy==2.2.6",
    "openai==2.26.0",
    "outcome==1.3.0",
    "packaging==25.0",
    "pandas==2.3.3",
    "patsy==1.0.2",
    "Pillow==12.1.1",
    "psycopg2-binary==2.9.11",
    "pycparser==2.22",
    "pyparsing==3.2.3",
    "PySocks==1.7.1",
    "python-dateutil==2.9.0.post0",
    "python-dotenv>=1.0.0",
    "pytz==2025.2",
    "regex==2026.2.28",
    "requests==2.32.5",
    "s3transfer==0.11.3",
    "scikit-learn==1.8.0",
    "scikit-posthocs==0.12.0",
    "scipy==1.17.1",
