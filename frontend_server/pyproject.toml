# Note: sklearn==0.0 dummy stub removed; scikit-learn==1.8.0 is the real dependency.
# Django upgraded to 4.2.20 LTS in US-012 (was 3.2.25 after US-011).
# django-storages-redux replaced with django-storages==1.14.4 (redux fork unsupported on Django 4.x).
# All other versions aligned with backend_server/pyproject.toml.

[tool.setuptools.packages.find]
where = ["."]
include = ["*"]
