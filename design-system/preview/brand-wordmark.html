<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{padding:18px 22px;background:var(--bg-page-grid);background-attachment:fixed;min-height:100vh;box-sizing:border-box;font-family:var(--ff-body);color:var(--fg-1)}
.eyebrow{font-family:var(--ff-display);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:12px}
.btn{border:2px solid var(--retro-ink);border-radius:0;padding:.55rem .95rem;font-family:var(--ff-display);font-weight:800;text-transform:uppercase;font-size:.72rem;letter-spacing:.05em;cursor:pointer;display:inline-block}
.input{width:260px;border:2px solid var(--retro-ink);background:#fff;color:var(--retro-ink);padding:.6rem .7rem;font-size:.8rem;font-family:var(--ff-body)}
.navlink{border:2px solid var(--retro-ink);background:var(--retro-sun);color:var(--retro-ink);text-transform:uppercase;font-weight:700;font-size:.7rem;letter-spacing:.03em;padding:.35rem .55rem;font-family:var(--ff-display);text-decoration:none;display:inline-block}
.badge{border:2px solid var(--retro-ink);display:inline-flex;align-items:center;justify-content:center;min-width:1.5rem;min-height:1.5rem;font-weight:800;font-family:var(--ff-display);font-size:.64rem;padding:2px 8px}
.panel{background:var(--bg-surface);border:3px solid var(--retro-orange);box-shadow:6px 6px 0 var(--retro-shadow);padding:16px}
</style></head><body>
<p class="eyebrow">Wordmark · text-only · Press Start 2P</p>
<div style="background:var(--retro-sky);border-bottom:4px solid var(--retro-orange);box-shadow:0 6px 0 var(--retro-shadow);padding:22px 18px">
  <div style="font-family:var(--ff-display);font-size:1.3rem;text-transform:uppercase;letter-spacing:.06em;color:var(--retro-ink)">Reverie Pixel Town</div>
</div>
<div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:10px">No logo mark exists. Wordmark stands alone, always on sky bg.</div></body></html>
