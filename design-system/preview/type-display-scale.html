<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{padding:18px 22px;background:var(--bg-page-grid);background-attachment:fixed;min-height:100vh;box-sizing:border-box;font-family:var(--ff-body);color:var(--fg-1)}
.eyebrow{font-family:var(--ff-display);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:14px}
.spec-row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px dashed color-mix(in srgb,var(--retro-ink) 25%, white)}
.spec-row:last-child{border-bottom:0}
.spec-meta{font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);width:150px;flex:none}
</style></head><body>
<p class="eyebrow">Press Start 2P · display scale</p>
<div class="col" style="gap:10px">
  <div class="spec-row"><div class="spec-meta">.t-h1 · 2.4rem</div><div style="font-family:var(--ff-display);font-size:2.4rem;text-transform:uppercase;letter-spacing:.04em">Pixel Town</div></div>
  <div class="spec-row"><div class="spec-meta">.t-h2 · 2rem</div><div style="font-family:var(--ff-display);font-size:1.6rem;text-transform:uppercase;letter-spacing:.04em">Dashboard</div></div>
  <div class="spec-row"><div class="spec-meta">.t-h3 · 1.125rem</div><div style="font-family:var(--ff-display);font-size:1.125rem;text-transform:uppercase;letter-spacing:.04em">My simulations</div></div>
  <div class="spec-row"><div class="spec-meta">.t-eyebrow · .64rem</div><div style="font-family:var(--ff-display);font-size:.64rem;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3)">Simulation name</div></div>
</div></body></html>
