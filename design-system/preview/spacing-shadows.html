<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{padding:18px 22px;background:var(--bg-page-grid);background-attachment:fixed;min-height:100vh;box-sizing:border-box;font-family:var(--ff-body);color:var(--fg-1)}
.eyebrow{font-family:var(--ff-display);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:14px}
.spec-row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px dashed color-mix(in srgb,var(--retro-ink) 25%, white)}
.spec-row:last-child{border-bottom:0}
.spec-meta{font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);width:150px;flex:none}
</style></head><body>
<p class="eyebrow">Shadows · hard offset · never blurred</p>
<div class="row" style="gap:32px">
  <div>
    <div style="height:80px;width:160px;background:var(--bg-surface);border:3px solid var(--retro-orange);box-shadow:6px 6px 0 var(--retro-shadow);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:.7rem;text-transform:uppercase">Panel</div>
    <div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:12px">6px 6px 0 #9d4f5c</div>
  </div>
  <div>
    <div style="height:80px;width:160px;background:var(--bg-surface);border:3px solid var(--retro-orange);box-shadow:4px 4px 0 var(--retro-shadow);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:.7rem;text-transform:uppercase">Small</div>
    <div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:12px">4px 4px 0 #9d4f5c</div>
  </div>
  <div>
    <div style="height:80px;width:160px;background:var(--retro-sky);border-bottom:4px solid var(--retro-orange);box-shadow:0 6px 0 var(--retro-shadow);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:.7rem;text-transform:uppercase">Header</div>
    <div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:12px">0 6px 0 #9d4f5c</div>
  </div>
</div></body></html>
