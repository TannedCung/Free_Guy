<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{padding:18px 22px;background:var(--bg-page-grid);background-attachment:fixed;min-height:100vh;box-sizing:border-box;font-family:var(--ff-body);color:var(--fg-1)}
.eyebrow{font-family:var(--ff-display);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:14px}
.spec-row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px dashed color-mix(in srgb,var(--retro-ink) 25%, white)}
.spec-row:last-child{border-bottom:0}
.spec-meta{font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);width:150px;flex:none}
</style></head><body>
<p class="eyebrow">Borders · 3 weights · never rounded</p>
<div class="row">
  <div style="width:200px">
    <div style="height:70px;border:2px solid var(--retro-ink);background:var(--bg-surface);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em">2px ink</div>
    <div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:6px">buttons · inputs · badges</div>
  </div>
  <div style="width:200px">
    <div style="height:70px;border:3px solid var(--retro-orange);background:var(--bg-surface);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em">3px orange</div>
    <div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:6px">panels · cards</div>
  </div>
  <div style="width:200px">
    <div style="height:70px;border:3px solid var(--retro-sky);background:var(--bg-info-soft);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em">3px sky</div>
    <div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:6px">step callouts</div>
  </div>
  <div style="width:200px">
    <div style="height:70px;border:2px dashed var(--retro-sky);background:var(--bg-surface);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em">2px dashed</div>
    <div style="font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);margin-top:6px">empty states</div>
  </div>
</div></body></html>
