<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{padding:18px 22px;background:var(--bg-page-grid);background-attachment:fixed;min-height:100vh;box-sizing:border-box;font-family:var(--ff-body);color:var(--fg-1)}
.eyebrow{font-family:var(--ff-display);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:14px}
</style></head><body>
<p class="eyebrow">Backgrounds · page · surface · soft status</p>
<div class="row">

<div style="width:170px">
  <div style="height:72px;background:var(--bg-page);background-image:var(--bg-page-grid);background-size:20px 20px;border:2px solid var(--retro-ink);box-shadow:4px 4px 0 var(--retro-shadow)"></div>
  <div style="margin-top:10px;font-family:var(--ff-mono);font-size:.72rem;color:var(--fg-1)">--bg-page</div>
</div>

<div style="width:170px">
  <div style="height:72px;background:var(--bg-surface);border:2px solid var(--retro-ink);box-shadow:4px 4px 0 var(--retro-shadow)"></div>
  <div style="margin-top:10px;font-family:var(--ff-mono);font-size:.72rem;color:var(--fg-1)">--bg-surface</div>
</div>

<div style="width:170px">
  <div style="height:72px;background:var(--bg-info-soft);border:2px solid var(--retro-ink);box-shadow:4px 4px 0 var(--retro-shadow)"></div>
  <div style="margin-top:10px;font-family:var(--ff-mono);font-size:.72rem;color:var(--fg-1)">--bg-info-soft</div>
</div>

<div style="width:170px">
  <div style="height:72px;background:#d4f0c8;border:2px solid var(--retro-ink);box-shadow:4px 4px 0 var(--retro-shadow)"></div>
  <div style="margin-top:10px;font-family:var(--ff-mono);font-size:.72rem;color:var(--fg-1)">--bg-success-soft</div>
</div>

<div style="width:170px">
  <div style="height:72px;background:var(--bg-warn-soft);border:2px solid var(--retro-ink);box-shadow:4px 4px 0 var(--retro-shadow)"></div>
  <div style="margin-top:10px;font-family:var(--ff-mono);font-size:.72rem;color:var(--fg-1)">--bg-warn-soft</div>
</div>

<div style="width:170px">
  <div style="height:72px;background:var(--bg-danger-soft);border:2px solid var(--retro-ink);box-shadow:4px 4px 0 var(--retro-shadow)"></div>
  <div style="margin-top:10px;font-family:var(--ff-mono);font-size:.72rem;color:var(--fg-1)">--bg-danger-soft</div>
</div>
</div></body></html>
