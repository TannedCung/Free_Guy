<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{padding:18px 22px;background:var(--bg-page-grid);background-attachment:fixed;min-height:100vh;box-sizing:border-box;font-family:var(--ff-body);color:var(--fg-1)}
.eyebrow{font-family:var(--ff-display);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:14px}
.spec-row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px dashed color-mix(in srgb,var(--retro-ink) 25%, white)}
.spec-row:last-child{border-bottom:0}
.spec-meta{font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);width:150px;flex:none}
</style></head><body>
<p class="eyebrow">Case · tracking · uppercase is load-bearing</p>
<div class="col" style="gap:10px">
  <div class="spec-row"><div class="spec-meta">Uppercase · .06em</div><div style="font-family:var(--ff-display);font-size:.9rem;text-transform:uppercase;letter-spacing:.06em">Create simulation</div></div>
  <div class="spec-row"><div class="spec-meta">Uppercase · .04em</div><div style="font-family:var(--ff-display);font-size:.9rem;text-transform:uppercase;letter-spacing:.04em">Create simulation</div></div>
  <div class="spec-row"><div class="spec-meta">Title case · no</div><div style="font-family:var(--ff-display);font-size:.85rem;letter-spacing:.02em;color:var(--fg-3);text-decoration:line-through">Create Simulation</div></div>
  <div class="spec-row"><div class="spec-meta">Sentence · body</div><div style="font-family:var(--ff-body);font-size:.85rem;color:var(--fg-2)">No characters yet. Create your first character!</div></div>
</div></body></html>
