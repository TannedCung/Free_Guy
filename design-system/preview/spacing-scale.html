<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0}
body{padding:18px 22px;background:var(--bg-page-grid);background-attachment:fixed;min-height:100vh;box-sizing:border-box;font-family:var(--ff-body);color:var(--fg-1)}
.eyebrow{font-family:var(--ff-display);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:14px}
.spec-row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px dashed color-mix(in srgb,var(--retro-ink) 25%, white)}
.spec-row:last-child{border-bottom:0}
.spec-meta{font-family:var(--ff-mono);font-size:.68rem;color:var(--fg-3);width:150px;flex:none}
</style></head><body>
<p class="eyebrow">Spacing scale · pixel-grid friendly</p>
<div class="col" style="gap:8px">

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-1 · 4px</div>
  <div style="height:16px;width:4px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-2 · 8px</div>
  <div style="height:16px;width:8px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-3 · 12px</div>
  <div style="height:16px;width:12px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-4 · 16px</div>
  <div style="height:16px;width:16px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-5 · 24px</div>
  <div style="height:16px;width:24px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-6 · 32px</div>
  <div style="height:16px;width:32px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-7 · 40px</div>
  <div style="height:16px;width:40px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>

<div style="display:flex;align-items:center;gap:14px">
  <div style="width:120px;font-family:var(--ff-mono);font-size:.72rem">--sp-8 · 48px</div>
  <div style="height:16px;width:48px;background:var(--retro-sun);border:2px solid var(--retro-ink);box-shadow:2px 2px 0 var(--retro-shadow)"></div>
</div>
</div></body></html>
