name: CI

on:
  push:
    branches: [main, "ralph/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, typecheck, test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('backend_server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install backend dependencies
        working-directory: backend_server
        run: pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend_server
        run: ruff check .

      - name: Mypy typecheck
        working-directory: backend_server
        run: mypy .

      - name: Pytest
        working-directory: backend_server
        env:
          OPENAI_API_KEY: test-key-for-ci
        run: pytest

  frontend-server:
    name: Frontend Server (typecheck, test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-frontend-server-${{ hashFiles('frontend_server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-frontend-server-

      - name: Install frontend_server dependencies
        working-directory: frontend_server
        run: pip install -e .

      - name: Django system check
        working-directory: frontend_server
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_ENV: development
        run: python manage.py check

      - name: Django tests
        working-directory: frontend_server
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_ENV: development
        run: python manage.py test translator.tests

  frontend:
    name: Frontend React (lint, typecheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit
